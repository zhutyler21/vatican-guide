<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b2118">
<title>意大利深度中文导览</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#2b2118;--card:#3a2e22;--cream:#f4ecdd;--coral:#e0533f;--gold:#e7b85a;--ink:#f4ecdd;--sub:#c9b89b;--line:#52412f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.75 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;padding-bottom:74px}header{position:sticky;top:0;z-index:40;padding:calc(env(safe-area-inset-top) + 11px) 16px 11px;background:rgba(43,33,24,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}h1{margin:0;font-size:18px;line-height:1.35;letter-spacing:.3px}header p{margin:2px 0 0;color:var(--sub);font-size:12px}.wrap{max-width:690px;margin:auto;padding:0 14px}.hero,.route,.hall-head,.work,.sources{border:1px solid var(--line);background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.24)}.hero{margin:17px 0 14px;padding:22px 17px 18px;border-radius:22px;text-align:center;background:linear-gradient(150deg,#4a3826,#34281c)}.hero .big{font-size:44px;line-height:1;margin-bottom:8px}.hero h2{margin:0;color:var(--gold);font-size:24px;line-height:1.3}.hero .en{margin:2px 0 10px;color:var(--coral);font-size:12px;letter-spacing:1.8px;font-weight:700}.hero .intro{margin:0;color:var(--sub);font-size:13.5px}.guide-switch{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.guide-switch button{border:1px solid var(--line);border-radius:15px;background:#34281c;color:var(--sub);padding:10px 5px;font:700 12px inherit;cursor:pointer}.guide-switch button.active{border-color:var(--gold);background:rgba(231,184,90,.13);color:var(--gold)}.guide-switch b{display:block;font-size:19px;line-height:1.1;margin-bottom:3px}.notice{margin:13px 0;padding:10px 13px;border:1px solid rgba(224,83,63,.4);border-radius:13px;background:rgba(224,83,63,.12);color:#f3c4ba;font-size:12.7px}.route{margin:14px 0 18px;padding:15px;border-radius:18px}.route h3{margin:0;color:var(--gold);font-size:16px}.route p{margin:2px 0 10px;color:var(--sub);font-size:12.5px}.route ol{padding:0;margin:0;list-style:none;counter-reset:steps}.route li{counter-increment:steps;position:relative;padding:8px 10px 8px 40px;margin:7px 0;background:rgba(231,184,90,.07);border:1px solid rgba(231,184,90,.2);border-radius:12px;cursor:pointer;font-size:13px}.route li:before{content:counter(steps);position:absolute;left:10px;top:9px;width:21px;height:21px;border-radius:50%;background:var(--coral);color:#fff;text-align:center;line-height:21px;font-weight:800;font-size:12px}.hall{margin:21px 0}.hall-head{padding:14px 16px;border-left:5px solid var(--coral);border-radius:16px;margin-bottom:13px;background:linear-gradient(135deg,#4a3826,#3a2e22)}.hall-head h2{margin:0;color:var(--gold);font-size:17px;line-height:1.45}.hall-head .sub{margin:2px 0 5px;color:var(--coral);font-size:12px;font-weight:700}.hall-head .intro{margin:0;color:var(--sub);font-size:13.4px}.work{overflow:hidden;margin:0 0 14px;border-radius:18px}.work img{display:block;width:100%;min-height:170px;max-height:380px;object-fit:cover;background:#1c150e}.work .body{padding:13px 15px 16px}.work h3{margin:0 0 2px;font-size:17px;line-height:1.4}.artist{margin:0 0 9px;color:var(--gold);font-size:12px}.look{display:flex;gap:8px;align-items:flex-start;padding:9px 10px;border:1px solid rgba(231,184,90,.3);border-radius:12px;background:rgba(231,184,90,.1);color:#f0dca8;font-size:13px}.play{width:100%;border:0;border-radius:13px;margin-top:11px;padding:12px;background:linear-gradient(135deg,var(--coral),#c8442f);color:#fff;font:800 15px inherit;cursor:pointer}.play.playing{background:linear-gradient(135deg,#3f7d5a,#2f6347)}.toggle{border:0;background:transparent;color:var(--sub);margin:8px 0 0;padding:0;font:12.5px inherit;text-decoration:underline;cursor:pointer}.script{display:none;color:#e6dcc8;font-size:14px;margin-top:10px}.script.open{display:block}.deep{margin-top:12px;border:1px solid rgba(231,184,90,.25);border-radius:12px;background:rgba(0,0,0,.12);padding:0 11px}.deep summary{padding:9px 0;color:var(--gold);font-weight:800;font-size:13px;cursor:pointer}.deep p{margin:0 0 11px;color:#e6dcc8;font-size:13.5px}.sources{margin:22px 0 8px;padding:13px 15px;border-radius:15px;color:var(--sub);font-size:12px}.sources strong{color:var(--gold)}.sources a{color:#f0dca8}.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;gap:6px;overflow:auto;padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);background:rgba(43,33,24,.97);border-top:1px solid var(--line);backdrop-filter:blur(8px);scrollbar-width:none}.nav::-webkit-scrollbar{display:none}.nav a{flex:none;padding:6px 10px;border:1px solid var(--line);border-radius:20px;background:var(--card);color:var(--sub);font-size:12px;text-decoration:none}.stop{position:fixed;z-index:60;bottom:62px;left:50%;transform:translateX(-50%);display:none;padding:8px 16px;border:1px solid var(--coral);border-radius:25px;background:#1c150e;color:#fff;font:700 13px inherit;box-shadow:0 5px 16px rgba(0,0,0,.4);cursor:pointer}.stop.show{display:block}.boost{margin:13px 0;padding:11px 13px;border:1px solid rgba(231,184,90,.33);border-radius:15px;background:linear-gradient(135deg,rgba(224,83,63,.14),rgba(231,184,90,.1));color:#f0dca8;font-size:12.5px}.boost strong{color:var(--gold)}.boost button{display:block;margin-top:8px;border:0;border-radius:99px;padding:8px 13px;background:var(--coral);color:#fff;font:800 12px inherit;cursor:pointer}.boost span{margin-left:8px;color:var(--sub)}footer{text-align:center;color:#7a6850;font-size:11px;margin:18px 0}
</style>
</head>
<body>
<header><h1 id="topTitle">🏛️ 梵蒂冈博物馆 · 中文导览</h1><p id="topTip">先按“往哪看”定位，再听精华讲解；展开“深度解读”补足背景。</p></header>
<main class="wrap">
  <section class="hero" id="home"><div class="big" id="heroEmoji">🏛️</div><h2 id="heroTitle">梵蒂冈博物馆</h2><p class="en" id="heroSub">MUSEI VATICANI · 艺术与权力的四千年</p><p class="intro" id="heroIntro"></p></section>
  <div class="guide-switch" id="guideSwitch" aria-label="切换景点导览"></div>
  <div class="notice" id="notice"></div>
  <div class="boost"><strong>🚀 出发前离线缓存</strong><br>网络正常时先缓存图片和已有语音；遗址内弱网也能继续看。<button id="boostBtn" type="button">一键缓存当前导览 <span id="boostStatus">建议出发前操作</span></button></div>
  <section class="route"><h3>🗺️ 推荐参观顺序</h3><p>先建立空间感，再进细节；临时闭馆或单行线请以现场为准。</p><ol id="routeList"></ol></section>
  <div id="app"></div>
  <section class="sources" id="sources"></section>
  <footer>导览内容为现场参观参考 · 图片为 Wikimedia Commons 公共版权或可再利用素材<br>清和乐章 · 中文深度导览</footer>
</main>
<nav class="nav" id="nav"></nav><button class="stop" id="stop">⏹ 停止播放</button>
<script src="data.js"></script>
<script>
const app=document.querySelector('#app'),nav=document.querySelector('#nav'),routeList=document.querySelector('#routeList'),stop=document.querySelector('#stop');
let active=GUIDES.vatican,curBtn=null; const audio=new Audio();audio.preload='none';let zhVoice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();zhVoice=vs.find(v=>/zh[-_]CN/i.test(v.lang)&&/Tingting|Mei|Yu|Female/i.test(v.name))||vs.find(v=>/zh[-_]CN/i.test(v.lang))||vs.find(v=>/^zh/i.test(v.lang))||null}pickVoice();speechSynthesis.onvoiceschanged=pickVoice;
function resetBtn(){if(curBtn){curBtn.classList.remove('playing');curBtn.textContent='🔊 ▶ 听精华讲解'}curBtn=null;stop.classList.remove('show')}
function stopAll(){speechSynthesis.cancel();audio.pause();audio.removeAttribute('src');audio.onerror=null;resetBtn()}
function fallback(text){const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=1;if(zhVoice)u.voice=zhVoice;u.onend=stopAll;u.onerror=stopAll;speechSynthesis.speak(u)}
function speak(id,text,btn){if(curBtn===btn){stopAll();return}stopAll();curBtn=btn;btn.classList.add('playing');btn.textContent='🎙️ 正在播放（点击停止）';stop.classList.add('show');audio.onerror=()=>{audio.onerror=null;fallback(text)};audio.onended=stopAll;audio.src='audio/'+id+'.mp3';audio.play().catch(()=>fallback(text))}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function selectGuide(key,scroll=true){if(!GUIDES[key])return;stopAll();active=GUIDES[key];document.title=active.title+' · 中文深度导览';document.querySelector('#topTitle').textContent=active.emoji+' '+active.title+' · 中文导览';document.querySelector('#heroEmoji').textContent=active.emoji;document.querySelector('#heroTitle').textContent=active.title;document.querySelector('#heroSub').textContent=active.subtitle;document.querySelector('#heroIntro').textContent=active.intro;document.querySelector('#notice').textContent='📌 '+active.notice;render();if(scroll){history.replaceState(null,'','#'+key);window.scrollTo({top:0,behavior:'smooth'})}}
function render(){const switches=document.querySelector('#guideSwitch');switches.innerHTML='';Object.values(GUIDES).forEach(g=>{const b=document.createElement('button');b.className=g.key===active.key?'active':'';b.innerHTML='<b>'+g.emoji+'</b>'+esc(g.title.replace('博物馆','').replace('古城',''));b.onclick=()=>selectGuide(g.key);switches.appendChild(b)});routeList.innerHTML='';app.innerHTML='';nav.innerHTML='';active.halls.forEach((hall,i)=>{const li=document.createElement('li');li.textContent=hall.name+' · '+hall.subtitle;li.onclick=()=>document.querySelector('#'+hall.id).scrollIntoView();routeList.appendChild(li);const sec=document.createElement('section');sec.className='hall';sec.id=hall.id;sec.innerHTML='<div class="hall-head"><h2>'+(i+1)+'. '+esc(hall.name)+'</h2><div class="sub">'+esc(hall.subtitle)+'</div><p class="intro">'+esc(hall.intro)+'</p></div>';hall.works.forEach(w=>{const card=document.createElement('article');card.className='work';card.innerHTML='<img src="images/'+esc(w.id)+'.jpg" alt="'+esc(w.title)+'"><div class="body"><h3>'+esc(w.title)+'</h3><p class="artist">'+esc(w.artist)+'</p><div class="look">👀 <span><b>往哪看：</b>'+esc(w.look)+'</span></div><button class="play">🔊 ▶ 听精华讲解</button><button class="toggle">显示/隐藏精华讲解文字</button><div class="script">'+esc(w.script)+'</div><details class="deep"><summary>✦ 深度解读：多看一层</summary><p>'+esc(w.detail||w.script)+'</p></details></div>';const img=card.querySelector('img');img.onerror=()=>{if(!img.dataset.png){img.dataset.png='1';img.src='images/'+w.id+'.png'}else{img.src='images/placeholder.svg';img.onerror=null}};card.querySelector('.play').onclick=()=>speak(w.id,w.script,card.querySelector('.play'));card.querySelector('.toggle').onclick=()=>card.querySelector('.script').classList.toggle('open');sec.appendChild(card)});app.appendChild(sec);const a=document.createElement('a');a.href='#'+hall.id;a.textContent=hall.name.replace(/（.*）/,'');nav.appendChild(a)});document.querySelector('#sources').innerHTML='<strong>资料来源与核验：</strong><br>'+active.sources.map(s=>'<a target="_blank" rel="noopener" href="'+esc(s[1])+'">'+esc(s[0])+'</a>').join('　·　')}
function guideAssets(){const u=['./','index.html','data.js','manifest.json','icon.png','sw.js','images/placeholder.svg'];active.halls.forEach(h=>h.works.forEach(w=>u.push('images/'+w.id+'.jpg','images/'+w.id+'.png','audio/'+w.id+'.mp3')));return [...new Set(u)]}
document.querySelector('#boostBtn').onclick=async()=>{const b=document.querySelector('#boostBtn'),status=document.querySelector('#boostStatus');if(!('caches'in window)){status.textContent='当前浏览器不支持';return}b.disabled=true;const urls=guideAssets(),c=await caches.open('italy-guide-manual-v1');let n=0;for(const u of urls){try{const r=await fetch(u,{cache:'reload'});if(r.ok)await c.put(u,r.clone())}catch(e){}status.textContent='缓存 '+(++n)+'/'+urls.length}status.textContent='缓存完成，可离线使用';b.disabled=false};
stop.onclick=stopAll;const legacy=location.hash.slice(1);if(legacy.startsWith('pompeii'))selectGuide('pompeii',false);else if(legacy.startsWith('colosseum'))selectGuide('colosseum',false);else selectGuide('vatican',false);if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body></html>
